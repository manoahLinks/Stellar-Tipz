name: Bug Report
description: File a bug report to help us improve the platform.
title: "[BUG]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!
        Please fill out this form as completely as possible so we can reproduce and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what you were trying to do and what went wrong...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        How can we reproduce this bug? Please provide step-by-step instructions.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened, including any error messages or unexpected states...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of Stellar Tipz does this bug affect?
      options:
        - "Frontend (React / UI)"
        - "Smart Contract (Soroban / Rust)"
        - "CI/CD & DevOps"
        - "Documentation"
        - "Other"
    validations:
      required: true
  - type: dropdown
    id: network
    attributes:
      label: Network Environment
      description: Which Stellar network were you using?
      options:
        - "Testnet"
        - "Mainnet"
        - "Local Sandbox"
        - "N/A"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      description: If this is a frontend bug, what browser and OS were you using?
      placeholder: e.g. Chrome 124 on Ubuntu 24.04
    validations:
      required: false
  - type: dropdown
    id: wallet
    attributes:
      label: Connected Wallet
      description: Which wallet were you using?
      options:
        - "Freighter"
        - "xBull"
        - "Albedo"
        - "Other"
        - "None / N/A"
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: Add any screenshots, browser console logs, or contract panic logs here.
      placeholder: Drag and drop images or paste logs here...
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context or information you think is relevant to this bug.
    validations:
      required: false
