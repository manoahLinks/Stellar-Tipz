# Local infrastructure for backend development: PostgreSQL, Redis, and the backend app.
# Usage:  docker compose -f backend/docker-compose.yml up
#
# One-command startup — brings up Postgres, Redis, and the backend together.
# The app container waits for both services to be healthy before starting.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tipz
      POSTGRES_PASSWORD: tipz
      POSTGRES_DB: tipz
    ports:
      - '5432:5432'
    volumes:
      - tipz_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tipz']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - tipz_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://tipz:tipz@postgres:5432/tipz
      REDIS_URL: redis://redis:6379
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  tipz_pgdata:
  tipz_redisdata:
